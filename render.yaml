services:
  - type: web
    name: sistema-gestao-alunos
    runtime: node
    plan: free
    rootDir: sistema/server
    buildCommand: npm install --include=dev && npm exec tsc
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

  - type: web
    name: sistema-gestao-alunos-frontend
    runtime: static
    rootDir: sistema/client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sistema-gestao-alunos.onrender.com/api
    routes:
      - type: rewrite
        source: /api/*
        destination: https://sistema-gestao-alunos.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
